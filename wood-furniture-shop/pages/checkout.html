<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Toán - STEVE JOB VN.</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/checkout.css">
</head>
<body>
  
  <div id="header-container"></div>

  <section class="page-header">
    <div class="container">
      <h1>Thanh Toán An Toàn</h1>
    </div>
  </section>

  <section class="container checkout-section">
    <div class="checkout-layout">
      <!-- Form thông tin -->
      <form class="checkout-form" id="checkout-form">
        <h3>Thông Tin Giao Hàng</h3>
        
        <div class="form-group">
          <label>Họ và tên *</label>
          <input type="text" id="fullname" required placeholder="Nhập họ và tên...">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Số điện thoại *</label>
            <input type="tel" id="phone" required placeholder="Nhập số điện thoại...">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Nhập địa chỉ email...">
          </div>
        </div>

        <div class="form-group">
          <label>Địa chỉ giao hàng chi tiết *</label>
          <textarea id="address" rows="3" required placeholder="Số nhà, đường, phường, quận, thành phố..."></textarea>
        </div>

        <h3 style="margin-top: 40px;">Phương Thức Thanh Toán</h3>
        <div class="payment-methods">
          <label class="payment-option">
            <input type="radio" name="payment" value="cod" checked>
            Thanh toán khi nhận hàng (COD)
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="bank">
            Chuyển khoản ngân hàng
          </label>
        </div>

        <button type="submit" class="btn mt-40 btn-full">Xác Nhận Đặt Hàng</button>
      </form>

      <!-- Tóm tắt đơn hàng (tái sử dụng cấu trúc cart summary) -->
      <div class="checkout-summary">
        <h3>Đơn Hàng Của Bạn</h3>
        <div id="checkout-items" class="checkout-items-list">
          <!-- Render list item nhỏ -->
        </div>
        <div class="summary-row total-row" style="margin-top: 20px;">
          <span>Tổng thanh toán</span>
          <span id="checkout-total">0 ₫</span>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/checkout.js"></script>
</body>
</html>
