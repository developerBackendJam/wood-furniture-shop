<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Sản Phẩm - STEVE JOB VN.</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    /* product-detail.css inlined cho nhanh, theo yêu cầu CSS riêng */
    .product-detail-section { margin: 80px auto; display: flex; gap: 50px; }
    .product-image { flex: 1; }
    .product-image img { width: 100%; border-radius: 8px; object-fit: cover; height: 500px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .product-info-detail { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .cat-badge { display: inline-block; padding: 5px 12px; background: #eee; color: var(--primary-color); border-radius: 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; }
    .product-info-detail h1 { font-size: 36px; margin-bottom: 15px; color: var(--primary-color); }
    .product-info-detail .price { font-size: 28px; color: var(--accent-color); font-weight: 700; margin-bottom: 20px; }
    .product-info-detail .desc { font-size: 16px; color: #555; margin-bottom: 30px; line-height: 1.8; }
    .specs-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
    .specs-table th, .specs-table td { padding: 12px 0; border-bottom: 1px solid var(--border-color); text-align: left; }
    .specs-table th { width: 40%; color: #888; font-weight: 500; }
    .add-to-cart-box { display: flex; gap: 15px; align-items: center; }
    .qty-input { width: 70px; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; text-align: center; font-size: 16px; }
    .btn-large { padding: 15px 40px; font-size: 16px; flex-grow: 1; }
    @media(max-width: 768px) { .product-detail-section { flex-direction: column; } .product-image img { height: 300px; } }
  </style>
</head>
<body>
  
  <div id="header-container"></div>

  <section class="container" id="product-detail-container">
    <div style="text-align:center; padding: 100px;"><h2>Đang tải thông tin sản phẩm...</h2></div>
  </section>

  <div id="footer-container"></div>

  <script src="../assets/js/utils.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const container = document.getElementById('product-detail-container');

      if (!productId) {
        container.innerHTML = "<div style='text-align:center; padding: 100px;'><h2>Không tìm thấy sản phẩm.</h2><a href='products.html' class='btn mt-40'>Quay lại cửa hàng</a></div>";
        return;
      }

      const products = await fetchProducts();
      const categories = await fetchCategories();
      const product = products.find(p => p.id === productId);

      if (!product) {
        container.innerHTML = "<div style='text-align:center; padding: 100px;'><h2>Không tìm thấy sản phẩm.</h2><a href='products.html' class='btn mt-40'>Quay lại cửa hàng</a></div>";
        return;
      }

      const cat = categories.find(c => c.id === product.categoryId);
      const catName = cat ? cat.name : "Nội thất";

      container.innerHTML = `
        <div class="product-detail-section">
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}">
          </div>
          <div class="product-info-detail">
            <div><span class="cat-badge">${catName}</span></div>
            <h1>${product.name}</h1>
            <div class="price">${formatCurrency(product.price)}</div>
            <p class="desc">${product.description}</p>
            
            <table class="specs-table">
              <tr>
                <th>Chất liệu</th>
                <td>${product.material}</td>
              </tr>
              <tr>
                <th>Kích thước</th>
                <td>${product.dimensions}</td>
              </tr>
              <tr>
                <th>Trạng thái</th>
                <td>${product.stock > 0 ? `<span style="color: green; font-weight:600;">Còn hàng (${product.stock})</span>` : `<span style="color: red; font-weight:600;">Hết hàng</span>`}</td>
              </tr>
            </table>

            <div class="add-to-cart-box">
              <input type="number" id="qty" class="qty-input" value="1" min="1" max="${product.stock}">
              <button class="btn btn-large" onclick="handleAddToCart('${product.id}')" ${product.stock === 0 ? 'disabled style="background:#ccc; cursor:not-allowed;"' : ''}>
                Thêm Vào Giỏ Hàng
              </button>
            </div>
          </div>
        </div>
      `;
    });

    function handleAddToCart(id) {
      const qty = parseInt(document.getElementById('qty').value) || 1;
      addToCart(id, qty);
    }
  </script>
</body>
</html>
